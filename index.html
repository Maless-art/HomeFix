<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>HomeFix</title>
  <meta name="theme-color" content="#1b75aa" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="splash" class="splash-screen" aria-label="Cargando HomeFix">
    <img src="img/logo.png" alt="HomeFix" class="splash-logo" />
  </div>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img class="brand-mark" src="img/logo.png" alt="HomeFix" />
        <div class="brand-copy">
          <img class="brand-word" src="img/homefix.png" alt="HOMEFIX" />
          <p>Control de mantenimiento del hogar</p>
        </div>
      </div>
      <button id="btnBackup" class="icon-btn" title="Exportar respaldo">⬇</button>
    </header>

    <main>
      <section id="dashboard" class="dashboard"></section>
      <section id="alerts" class="alerts"></section>
      <section id="view" class="view"></section>
    </main>

    <nav class="bottom-nav">
      <button id="navHome" class="nav-btn active">🏠<span>Casa</span></button>
      <button id="navTimeline" class="nav-btn">🕒<span>Historial</span></button>
      <button id="navSettings" class="nav-btn">⚙️<span>Datos</span></button>
    </nav>
  </div>

  <button id="fab" class="fab">＋</button>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="modalTitle">Nuevo</h2>
        <button id="closeModal" class="icon-btn">✕</button>
      </div>
      <form id="modalForm" class="form"></form>
    </div>
  </div>

  <input id="importFile" type="file" accept="application/json" hidden />
  <script src="app.js"></script>
</body>
</html>
